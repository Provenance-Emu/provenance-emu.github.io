baseurl = "https://provenance-emu.com"
title = "Provenance - Free iOS & tvOS Retro Game Emulator"
theme = ["hugo-social-metadata", "hugo-redirect", "hugo-cloak-email", "small-apps-prov"]
themesDir = "themes"
languageCode = "en-us"
summaryLength = "10"
# Site language. Available translations in the theme's `/i18n` directory.
defaultContentLanguage = "en"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
# Enable comments by entering your Disqus shortname
disqusShortname = "provenance-emu"
# Google Analytics - Universal Analytics (UA-*) was sunset July 2023; removed.
# googleAnalytics = "UA-128934358-3"

# Define the number of posts per page
[pagination]
    pagerSize = 6

# Pygment Code
tsCodefences = true
pygmentsStyle = "solarized-dark"

[menu]

# Main menu

    # [[menu.main]]
    #     identifier="home"
    #     name = "Home"
    #     url  = "/"
    #     weight = 1

    [[menu.main]]
        identifier = "plus"
        name = "Plus"
        url  = "/plus/"
        weight = 2

    [[menu.main]]
        identifier="blog"
        name = "Blog"
        url  = "/blog/"
        weight = 3

    [[menu.main]]
        identifier = "source"
        name = "Source"
        url = "https://github.com/Provenance-Emu/Provenance"
        pre = "<i class='fab fa-2x fa-github'></i>"
        target = "_blank"
        hrefTargetBlank = true
        weight = 4

    [[menu.main]]
        identifier = "docs"
        name = "Docs"
        url  = "https://wiki.provenance-emu.com/"
        weight = 5

    [[menu.main]]
        identifier = "faq"
        name = "FAQ"
        url  = "https://wiki.provenance-emu.com/faqs"
        weight = 6

    [[menu.main]]
        identifier = "donate"
        name = "Donate"
        url  = "/donate/"
        weight = 7

    [[menu.main]]
        identifier = "discord"
        name = "Discord"
        url  = "https://discord.gg/4TK7PU5"
        weight = 8

    [[menu.main]]
        identifier = "press"
        name = "Press"
        url  = "/press/"
        weight = 8

    [[menu.main]]
        identifier = "privacy"
        name = "Privacy Policy"
        url  = "/privacy/"
        weight = 9

    # [[menu.main]]
    #     identifier = "contact"
    #     name = "Contact"
    #     url  = "/contact/"
    #     weight = 6

    # Top bar social links menu

    [[menu.topbar]]
        weight = 1
        name = "GitHub"
        url = "https://github.com/Provenance-Emu/Provenance"
        pre = "<i class='fab fa-2x fa-github'></i>"

    [[menu.topbar]]
        weight = 2
        name = "Facebook"
        url = "https://www.facebook.com/provenance.emu/"
        pre = "<i class='fab fa-2x fa-facebook'></i>"

    [[menu.topbar]]
        weight = 3
        name = "Twitter"
        url = "https://x.com/provenanceapp"
        pre = "<i class='fab fa-2x fa-twitter'></i>"

    [[menu.topbar]]
        weight = 4
        name = "Email"
        url = "mailto:help@provenance-emu.com"
        pre = "<i class='fas fa-2x fa-envelope'></i>"

[params]
    viewMorePostLink = "/blog/"
    author = "Provenance Team"
    defaultKeywords = []
    mainSections = ["blog"]
    defaultDescription = ""

    # Social media
    facebook_site = "provenance.emu" # the Facebook handle of your site ('https://www.facebook.com/HANDLE')
    twitter_site = "provenanceapp" # the Twitter handle of your site (without the '@')
    SocialImage = "img/sharing-default.png"

    # Style options: default (light-blue), blue, green, marsala, pink, red, turquoise, violet
    style = "blue"

    # Since this template is static, the contact form uses www.formspree.io as a
    # proxy. The form makes a POST request to their servers to send the actual
    # email. Visitors can send up to a 50 emails each month for free.
    #
    # What you need to do for the setup?
    #
    # - register your account to https://formspree.io/register
    # - login and create new form
    # - set your form's endpoint url under 'formspree_action' below
    # - upload the generated site to your server
    # - test a dummy email yourself
    # - you're done. Happy mailing!
    #
    # Enable the contact form by entering your Formspree.io endpoint url
    formspree_action = "https://formspree.io/sample/of/endpoint"
    contact_form_ajax = false

    about_us = "<p>.</p>"
    copyright = "Copyright (c) 2018 - 2026, Provenance EMU; all rights reserved."

    # Format dates with Go's time formatting
    date_format = "January 2, 2006"

    logo = "img/logo.png"
    logoAlt = "img/logo-small.png"
    logo_small = "img/logo-small.png"
    address = ""
    home = "Home"
    # Meta data
    description = "Provenance is a free, open-source multi-system emulator for iPhone, iPad, and Apple TV. Play retro games from 38+ consoles — SNES, PlayStation, N64, GBA, and more. No jailbreak required."
    # google map
    #gmapAPI = "https://maps.googleapis.com/maps/api/js?key=KEY&libraries=places"
    #mapLatitude = "51.5223477"
    #mapLongitude = "-0.1622023"
    mapMarker = "images/marker.png"
    # Google Analytics - Universal Analytics (UA-*) was sunset July 2023; removed.
    # googleAnalitycsID = "UA-128934358-3"

    # Preloader
    [params.preloader]
        enable = false

        # footer
    [params.footer]

        # social icon
        [[params.footer.socialIcon]]
            icon = "tf-ion-social-facebook"
            URL = "https://facebook.com/provenance.emu/"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-twitter"
            URL = "https://x.com/provenanceapp"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-github"
            URL = "https://github.com/Provenance-Emu/Provenance"

        [[params.footer.socialIcon]]
            icon = "fab fa-discord"
            URL = "https://discord.gg/4TK7PU5"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-twitch"
            URL = "https://twitch.tv/joemattiello/"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-youtube"
            URL = "https://www.youtube.com/channel/UCKeN6unYKdayfgLWulXgB1w"

    # call to action
    [params.cta]
        enable = true
        title = "Ready to Relive the Classics?"
        content = "Download Provenance from the App Store and start playing your favorite retro games on iPhone, iPad, and Apple TV today."
        btnText = "Get Provenance"
        URL = "https://apps.apple.com/us/app/provenance-app/id1596862805"

    [permalinks]
        blog = "/blog/:year/:month/:day/:slug/"

    # Enable or disable top bar with social icons
    [params.topbar]
        enable = true
        text = """
        <p class="hidden-sm hidden-xs"></p>
        <p class="hidden-md hidden-lg">
          <a href="#" data-animate-hover="pulse"><i class="fas fa-phone"></i></a>
          <a href="#" data-animate-hover="pulse"><i class="fas fa-envelope"></i></a>
        </p>
        """

    # Enable and disable widgets for the right sidebar
    [params.widgets]
        categories = false
        tags = true
        search = true

    [params.carousel]
        enable = false
        # All carousel items are defined in their own files. You can find example items
        # at 'exampleSite/data/carousel'.
        # For more informtion take a look at the README.

    [params.features]
        enable = false
        # All features are defined in their own files. You can find example items
        # at 'exampleSite/data/features'.
        # For more informtion take a look at the README.

    [params.testimonials]
        enable = false
        # All testimonials are defined in their own files. You can find example items
        # at 'exampleSite/data/testimonials'.
        # For more informtion take a look at the README.
        title = "Testimonials"
        subtitle = "We have worked with many clients and we always like to hear they come out from the cooperation happy and satisfied. Have a look what our clients said about us."

    [params.see_more]
        enable = false
        icon = "far fa-file-alt"
        title = "Do you want to see more?"
        subtitle = "We have prepared for you more than 40 different HTML pages, including 5 variations of homepage."
        link_url = "#"
        link_text = "Check other homepages"

    [params.clients]
        enable = false
        # All clients are defined in their own files. You can find example items
        # at 'exampleSite/data/clients'.
        # For more informtion take a look at the README.
        title = "Our Clients"
        subtitle = ""

    [params.recent_posts]
        enable = true
        title = "From our blog"
        subtitle = "Release notes, development updates, and news about Provenance."

    # Plugins
    [params.plugins]

        # CSS Plugins (loaded on all pages)
        [[params.plugins.css]]
            URL = "plugins/bootstrap/bootstrap.min.css"
        [[params.plugins.css]]
            URL = "plugins/themefisher-font/style.css"
        [[params.plugins.css]]
            URL = "css/provenance-custom.css"

        # CSS Plugins (homepage-only — loaded conditionally in head.html)
        [[params.plugins.css_homepage]]
            URL = "plugins/owl-carousel/assets/owl.carousel.min.css"
        [[params.plugins.css_homepage]]
            URL = "plugins/owl-carousel/assets/owl.theme.green.min.css"
        # Fancybox removed: promoVideo is disabled so data-fancybox never renders

        # JS Plugins (loaded on all pages)
        [[params.plugins.js]]
            URL = "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        [[params.plugins.js]]
            URL = "plugins/bootstrap/bootstrap.min.js"

        # JS Plugins (homepage-only — loaded conditionally in footer.html)
        [[params.plugins.js_homepage]]
            URL = "plugins/aos/aos.js"
        [[params.plugins.js_homepage]]
            URL = "plugins/owl-carousel/owl.carousel.min.js"
        # Fancybox removed: promoVideo is disabled so data-fancybox never renders

# https://github.com/kaushalmodi/hugo-atom-feed
[outputs]
  # <domain>/atom.xml
  home = ["HTML", "RSS"]     # default = ["HTML", "RSS"]
  # <domain>/posts/atom.xml
  section = ["HTML", "RSS"]  # default = ["HTML", "RSS"]
  # <domain>/tags/mytag/atom.xml, <domain>/categories/mycat/atom.xml
  #taxonomy = ["HTML", "RSS", "ATOM"] # default = ["HTML", "RSS"]

[mediaTypes]
    [mediaTypes."application/atom"]
            suffixes = ["xml"]

[outputFormats]
        [outputFormats.Atom]
                mediaType = "application/atom"
                baseName = "index"
                isPlainText = false
