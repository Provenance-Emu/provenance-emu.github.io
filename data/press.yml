features:
  - title: "Most Comprehensive System Support"
    description: "38+ console systems from Atari 2600 to PlayStation 2, including rare systems like PC-FX, Virtual Boy, 3DO, and Neo Geo Pocket."
  - title: "Premier Apple TV Emulator"
    description: "The only emulator with full native tvOS support, TopShelf integration, Siri Remote optimization, and 4K-ready output."
  - title: "Museum-Quality Game Library"
    description: "Automatic box art, screenshots, manuals, ratings, and release info for every game. A digital collection, not just a game list."
  - title: "100% Open Source"
    description: "Fully transparent code on GitHub. No hidden tracking, no data collection. Community-driven since 2016."
  - title: "Actively Developed — New Features Regularly"
    description: "Online cheat code lookup from the libretro database, an in-app controller guide, configurable CRT shaders, expanded cheat support across 10+ cores, and more landing continuously."
  - title: "Free Forever When Sideloaded"
    description: "All features are free when sideloaded or built from source. No subscriptions, no paywalls, no tiers."

