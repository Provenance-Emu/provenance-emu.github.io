name: Auto-update PRs on base branch push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: auto-update-prs-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  auto-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Update open PRs targeting ${{ github.ref_name }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const base = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              base,
              state: 'open',
              per_page: 100,
            });

            console.log(`Found ${prs.length} open PR(s) targeting ${base}`);

            let updated = 0;
            let skipped = 0;

            for (const pr of prs) {
              // Skip fork PRs — we can't push to external repos
              if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
                console.log(`Skipping PR #${pr.number} (fork): ${pr.title}`);
                skipped++;
                continue;
              }

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                });
                console.log(`✓ Updated PR #${pr.number}: ${pr.title}`);
                updated++;
              } catch (e) {
                // "already up to date" is a 422 — not a real error
                if (e.status === 422 || e.message?.toLowerCase().includes('already up to date')) {
                  console.log(`  PR #${pr.number} already up to date`);
                } else {
                  console.error(`✗ PR #${pr.number} failed: ${e.message}`);
                }
              }
            }

            console.log(`\nDone: ${updated} updated, ${skipped} fork(s) skipped.`);
