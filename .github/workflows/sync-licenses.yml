name: Sync License Data

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  repository_dispatch:
    types: [licenses-updated]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to fetch from (default: develop)'
        required: false
        default: 'develop'

permissions:
  contents: write

jobs:
  sync:
    name: Fetch licenses.json from main repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch licenses.json
        run: |
          REF="${{ github.event.client_payload.ref || github.event.inputs.ref || 'develop' }}"
          curl -fsSL \
            "https://raw.githubusercontent.com/Provenance-Emu/Provenance/${REF}/Scripts/licenses.json" \
            -o data/licenses.json
          echo "Fetched $(python3 -c "import json; d=json.load(open('data/licenses.json')); print(len(d['entries']))" ) entries"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/licenses.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to licenses.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat data/licenses.json
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/licenses.json
          git commit -m "chore: sync license data from Provenance/develop

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
