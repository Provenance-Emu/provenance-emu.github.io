[params]
    viewMorePostLink = "/blog/"
    author = "Provenance Team"
    defaultKeywords = ["iOS game emulator", "retro game emulator", "iPhone emulator", "iPad emulator", "iOS emulator", "free emulator iOS", "SNES emulator", "N64 emulator", "PlayStation emulator", "GBA emulator", "retro gaming iOS", "multi-system emulator"]
    Keywords = "iOS game emulator, retro game emulator, iPhone emulator, iPad emulator, free iOS emulator, SNES emulator, N64 emulator, PlayStation emulator, GBA emulator, multi-system emulator, retro gaming"
    mainSections = ["blog"]
    defaultDescription = ""

    facebook_site = "provenance.emu"
    twitter_site = "provenanceapp"
    SocialImage = "img/sharing-default.png"

    style = "blue"

    formspree_action = "https://formspree.io/sample/of/endpoint"
    contact_form_ajax = false

    about_us = "<p>.</p>"
    copyright = "Copyright (c) 2018 - 2026, Provenance EMU; all rights reserved."

    date_format = "January 2, 2006"

    logo = "img/logo.png"
    logoAlt = "img/logo-small.png"
    logo_small = "img/logo-small.png"
    address = ""
    home = "Home"
    description = "Provenance is a free, open-source multi-system emulator for iPhone, iPad, and Apple TV. Play retro games from 38+ consoles — SNES, PlayStation, N64, GBA, and more. No jailbreak required."
    mapMarker = "images/marker.png"

    [params.preloader]
        enable = false

    [params.footer]

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-facebook"
            URL = "https://facebook.com/provenance.emu/"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-twitter"
            URL = "https://x.com/provenanceapp"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-github"
            URL = "https://github.com/Provenance-Emu/Provenance"

        [[params.footer.socialIcon]]
            icon = "fab fa-discord"
            URL = "https://discord.gg/4TK7PU5"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-twitch"
            URL = "https://twitch.tv/joemattiello/"

        [[params.footer.socialIcon]]
            icon = "tf-ion-social-youtube"
            URL = "https://www.youtube.com/channel/UCKeN6unYKdayfgLWulXgB1w"

    [params.cta]
        enable = true
        title = "Ready to Relive the Classics?"
        content = "Download Provenance from the App Store and start playing your favorite retro games on iPhone, iPad, and Apple TV today."
        btnText = "Get Provenance"
        URL = "https://apps.apple.com/us/app/provenance-app/id1596862805"

    [permalinks]
        blog = "/blog/:year/:month/:day/:slug/"

    [params.topbar]
        enable = true
        text = """
        <p class="hidden-sm hidden-xs"></p>
        <p class="hidden-md hidden-lg">
          <a href="#" data-animate-hover="pulse"><i class="fas fa-phone"></i></a>
          <a href="#" data-animate-hover="pulse"><i class="fas fa-envelope"></i></a>
        </p>
        """

    [params.widgets]
        categories = false
        tags = true
        search = true

    [params.carousel]
        enable = false

    [params.features]
        enable = false

    [params.testimonials]
        enable = false
        title = "Testimonials"
        subtitle = "We have worked with many clients and we always like to hear they come out from the cooperation happy and satisfied. Have a look what our clients said about us."

    [params.see_more]
        enable = false

    [params.clients]
        enable = false
        title = "Our Clients"
        subtitle = ""

    [params.recent_posts]
        enable = true
        title = "From our blog"
        subtitle = "Release notes, development updates, and news about Provenance."

    # Plugins
    [params.plugins]

        # CSS Plugins (loaded on all pages)
        [[params.plugins.css]]
            URL = "plugins/bootstrap/bootstrap.min.css"
        [[params.plugins.css]]
            URL = "plugins/themefisher-font/style.css"
        [[params.plugins.css]]
            URL = "css/provenance-custom.css"
        # Dark theme overrides — must come last to win the cascade
        [[params.plugins.css]]
            URL = "css/dark-theme.css"

        # CSS Plugins (homepage-only)
        [[params.plugins.css_homepage]]
            URL = "plugins/owl-carousel/assets/owl.carousel.min.css"
        [[params.plugins.css_homepage]]
            URL = "plugins/owl-carousel/assets/owl.theme.green.min.css"

        # JS Plugins (loaded on all pages)
        [[params.plugins.js]]
            URL = "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        [[params.plugins.js]]
            URL = "plugins/bootstrap/bootstrap.min.js"

        # JS Plugins (homepage-only)
        [[params.plugins.js_homepage]]
            URL = "plugins/aos/aos.js"
        [[params.plugins.js_homepage]]
            URL = "plugins/owl-carousel/owl.carousel.min.js"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[mediaTypes]
    [mediaTypes."application/atom"]
            suffixes = ["xml"]

[outputFormats]
        [outputFormats.Atom]
                mediaType = "application/atom"
                baseName = "index"
                isPlainText = false
