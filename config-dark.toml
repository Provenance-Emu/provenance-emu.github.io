## config-dark.toml — Provenance dark theme preview config
## Usage: hugo server --config config-dark.toml
## Production build: hugo --config config-dark.toml --minify

baseurl = "https://provenance-emu.com"
title = "Provenance - Free iOS & tvOS Retro Game Emulator"

# provenance-dark sits first → its assets/layouts take precedence over small-apps-prov
theme = ["provenance-dark", "hugo-social-metadata", "hugo-redirect", "hugo-cloak-email", "small-apps-prov"]

themesDir = "themes"
languageCode = "en-us"
summaryLength = "10"
defaultContentLanguage = "en"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

disqusShortname = "provenance-emu"

[pagination]
    pagerSize = 6

tsCodefences = true
pygmentsStyle = "solarized-dark"

